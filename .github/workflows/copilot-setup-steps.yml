# Copilot Coding Agent - Pre-install Setup Steps
# This workflow pre-installs all dependencies so the Copilot coding agent
# environment is ready without waiting for installs at runtime.
# Docs: https://docs.github.com/en/copilot/customizing-copilot/customizing-the-development-environment-for-copilot-coding-agent

name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - "frontend/package-lock.json"
      - "backend/package-lock.json"
      - "backend/TaskApi/TaskApi.csproj"

jobs:
  copilot-setup-steps:
    name: "Pre-install Dependencies"
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── .NET 9 (ASP.NET Core backend) ─────────────────────────────────────
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore .NET dependencies
        working-directory: backend/TaskApi
        run: dotnet restore

      - name: Build ASP.NET Core backend
        working-directory: backend/TaskApi
        run: dotnet build --no-restore --configuration Release

      # ── Node.js (Frontend + Legacy backend) ───────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # ── Frontend (React + TypeScript) ─────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ── Backend Node (Jest tests & legacy scripts) ─────────────────────────
      - name: Install backend Node dependencies
        working-directory: backend
        run: npm ci

      # ── Playwright Browsers ───────────────────────────────────────────────
      - name: Install Playwright browsers (frontend)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Install Playwright browsers (backend e2e)
        working-directory: backend
        run: npx playwright install --with-deps chromium

      # ── Verify setup ──────────────────────────────────────────────────────
      - name: Verify .NET version
        run: dotnet --version

      - name: Verify Node version
        run: node --version

      - name: Verify frontend build
        working-directory: frontend
        run: npm run build

      - name: Verify backend .NET build artifacts
        working-directory: backend/TaskApi
        run: dotnet build --no-restore --configuration Release --verbosity minimal
